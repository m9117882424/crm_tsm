name: ci

on:
  push:
  pull_request:

jobs:
  compose-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.example .env && sed -i "s/CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_HEX_64/test-secret-key-base-local-ci-only/" .env
      - name: Validate Docker Compose
        run: docker compose config
