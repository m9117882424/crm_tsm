services:
  openproject:
    image: openproject/openproject:${OPENPROJECT_TAG:-17}
    container_name: crm_tsm_openproject
    restart: unless-stopped
    ports:
      - "${OPENPROJECT_PORT:-8080}:80"
    environment:
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      OPENPROJECT_HOST__NAME: "${OPENPROJECT_HOST_NAME:-localhost:8080}"
      OPENPROJECT_HTTPS: "${OPENPROJECT_HTTPS:-false}"
      OPENPROJECT_DEFAULT__LANGUAGE: "${OPENPROJECT_DEFAULT_LANGUAGE:-ru}"
    volumes:
      - openproject_pgdata:/var/openproject/pgdata
      - openproject_assets:/var/openproject/assets

  telegram_bot:
    build:
      context: ./integrations/telegram_bot
    container_name: crm_tsm_telegram_bot
    restart: unless-stopped
    profiles:
      - bot
    ports:
      - "8090:8090"
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_ALLOWED_CHAT_ID: "${TELEGRAM_ALLOWED_CHAT_ID}"
      OPENPROJECT_BASE_URL: "${OPENPROJECT_BASE_URL:-http://openproject}"
      OPENPROJECT_API_TOKEN: "${OPENPROJECT_API_TOKEN}"
    depends_on:
      - openproject

volumes:
  openproject_pgdata:
  openproject_assets:
