services:
  db:
    image: mariadb:10.11
    container_name: crm_tsm_leantime_db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${LEAN_DB_DATABASE}"
      MYSQL_USER: "${LEAN_DB_USER}"
      MYSQL_PASSWORD: "${LEAN_DB_PASSWORD}"
    volumes:
      - leantime_db:/var/lib/mysql

  leantime:
    image: leantime/leantime:latest
    container_name: crm_tsm_leantime
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${LEANTIME_PORT:-8082}:8080"
    environment:
      LEAN_DB_HOST: "db"
      LEAN_DB_USER: "${LEAN_DB_USER}"
      LEAN_DB_PASSWORD: "${LEAN_DB_PASSWORD}"
      LEAN_DB_DATABASE: "${LEAN_DB_DATABASE}"
      LEAN_EMAIL_RETURN: "${LEAN_EMAIL_RETURN}"
      LEAN_APP_URL: "${LEAN_APP_URL}"
    volumes:
      - leantime_userfiles:/var/www/html/userfiles
      - leantime_plugins:/var/www/html/app/Plugins

volumes:
  leantime_db:
  leantime_userfiles:
  leantime_plugins:
